<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      color: #0f172a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 680px;
      padding: 2rem;
    }

    .coming-soon {
      font-family: 'Playfair Display', serif;
      font-size: 4.2rem;
      font-weight: 700;
      color: #1e2937;
      margin-bottom: 1.2rem;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 1.35rem;
      color: #475569;
      line-height: 1.7;
      max-width: 520px;
      margin: 0 auto;
    }

    .footer {
      margin-top: 5rem;
      font-size: 1.05rem;
      color: #64748b;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="coming-soon">Something Coming Soon</h1>
    
    <p class="subtitle">
      We're crafting something special just for you.<br>
      It will be worth the wait.
    </p>

    <div class="footer">
      Thank you for your patience ❤️
    </div>
  </div>
</body>
  </html>
